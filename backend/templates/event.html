<!DOCTYPE html>
<html>
<head>
    <title>Event - {{ event.event_id }}</title>
</head>
<body>
    <h1>Event: {{ event.event_id }}</h1>
    <p>Timestamp: {{ event.timestamp }}</p>
    <h2>Frames</h2>
    {% if event.frames %}
        {% for img in event.frames %}
            <img src="{{ url_for('static', filename=img) }}" width="300">
        {% endfor %}
    {% else %}
        <p>No frames available for this event.</p>
    {% endif %}
    <hr>
    <a href="/">Back to Dashboard</a>
</body>
</html>
